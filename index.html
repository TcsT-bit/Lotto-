<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LOTTO PRIME OMEGA v7 - P500</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@900&family=Rajdhani:wght@700&display=swap');
:root{--neon1:#00f5ff; --neon2:#ff00ff; --neon3:#00ff88; --bg:#000}
*{margin:0; padding:0; box-sizing:border-box}
body{background:#000; color:#fff; font-family:'Rajdhani'; overflow:hidden}
#canvas3d{position:fixed; top:0; left:0; z-index:0}
.hud{position:relative; z-index:10; padding:20px}
.title{font-family:'Exo 2'; font-size:32px; background:linear-gradient(90deg,var(--neon1),var(--neon2),var(--neon3)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; animation:rainbow 3s linear infinite}
@keyframes rainbow{0%{filter:hue-rotate(0)}100%{filter:hue-rotate(360deg)}}
.liquid-glass{background:rgba(255,255,255,0.03); backdrop-filter:blur(40px) saturate(180%); border:1px solid rgba(255,255,255,0.1); border-radius:30px; box-shadow:inset 0 0 20px rgba(255,255,255,0.1)}
.floating-btn{padding:18px 32px; border:none; border-radius:20px; background:linear-gradient(135deg,var(--neon1),var(--neon2)); color:#000; font-weight:900; font-size:18px; cursor:pointer; box-shadow:0 0 40px var(--neon1); transition:0.3s}
.floating-btn:hover{transform:scale(1.1) rotate(2deg)}
.pillar-counter{position:fixed; bottom:20px; right:20px; font-size:14px; padding:10px 20px}
.grid-p500{display:grid; grid-template-columns:repeat(auto-fit, minmax(200px,1fr)); gap:15px; margin-top:20px}
.card-p{padding:20px; transition:0.4s}
.card-p:hover{transform:perspective(1000px) rotateX(5deg) translateZ(20px)}
</style>
</head>
<body>
<canvas id="canvas3d"></canvas>

<div class="hud">
<h1 class="title">LOTTO PRIME OMEGA</h1>
<p>P500/500 ACTIVE | QUANTUM SYNC: 99.9%</p>

<div class="grid-p500">
<div class="card-p liquid-glass"><b>P500</b><h3>THE PILLAR</h3><button class="floating-btn" onclick="alert('Demo: You are now CEO of Reality')">ASCEND</button></div>
<div class="card-p liquid-glass"><b>P251</b><h3>Neuralink Pick</h3><button class="floating-btn">🧠 THINK NUMBERS</button></div>
<div class="card-p liquid-glass"><b>P101</b><h3>3D Hologram Draw</h3><button class="floating-btn">PROJECT BALLS</button></div>
<div class="card-p liquid-glass"><b>P111</b><h3>AI God "Lucky"</h3><button class="floating-btn">VOICE CHAT</button></div>
<div class="card-p liquid-glass"><b>P400</b><h3>Become The House</h3><button class="floating-btn">OWN THE BANK</button></div>
<div class="card-p liquid-glass"><b>P181</b><h3>Wellness AI</h3><button class="floating-btn">MEDITATE</button></div>
</div>

<div class="pillar-counter liquid-glass">DEMO MODE | ALL DATA LOCAL</div>
</div>

<script>
// FAKE 3D BACKGROUND - Particle field
const canvas = document.getElementById('canvas3d');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
let particles = Array(200).fill().map(()=>({x:Math.random()*canvas.width, y:Math.random()*canvas.height, r:Math.random()*2}));
function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
particles.forEach(p=>{
p.y -= 0.5; if(p.y<0)p.y=canvas.height;
ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); 
ctx.fillStyle = 'rgba(0,245,255,0.5)'; ctx.fill();
});
requestAnimationFrame(animate);
}
animate();

// STATE
let state = {pillars:500, ui:12, reality:1};
localStorage.setItem('omega', JSON.stringify(state));
</script>
</body>
</html>
